services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - HA_URL=${HA_URL}
      - HA_TOKEN=${HA_TOKEN}
      - CONFIG_DIR=/config
      - PORT=5000
    volumes:
      - ./config:/config
    # Not exposed to the host — only reachable by the frontend container.

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
