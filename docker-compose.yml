services:
  backend:
    build: ./backend
    image: ghcr.io/jumblejumble/ha-dashboard-backend:latest
    restart: unless-stopped
    environment:
      - HA_URL=${HA_URL}
      - HA_TOKEN=${HA_TOKEN}
      - CONFIG_DIR=/config
      - PORT=5000
    volumes:
      - ./config:/config

  frontend:
    build: ./frontend
    image: ghcr.io/jumblejumble/ha-dashboard-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
